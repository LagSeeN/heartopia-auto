# ===========================================================================
#  Heartopia Auto - ไฟล์ตั้งค่าหลัก
#  แก้ค่าตรงนี้เพื่อปรับพฤติกรรมบอท (ไม่ต้องแก้โค้ด)
# ===========================================================================

# ภาษาของ UI: en = English, th = ไทย (สลับได้ในหน้า Settings ของ GUI)
language: en
# ธีมหน้าตา: auto (ตามระบบ) / dark / light
theme: auto

window:
  # คำที่ใช้ค้นหาหน้าต่างเกมอัตโนมัติ (match แบบ substring ไม่สนตัวพิมพ์เล็ก/ใหญ่)
  # ถ้าหาไม่เจอ ให้เลือกหน้าต่างเองจาก dropdown ใน GUI
  title_keywords: ["Heartopia", "心动小镇", "TapTap"]
  # จับเฉพาะพื้นที่ภายใน (client area) ตัดแถบ title bar ออก -> พิกัดคงที่กว่า
  use_client_area: true

vision:
  match_threshold: 0.80   # ความมั่นใจขั้นต่ำในการ match รูป (0.0 - 1.0). ต่ำ=หาเจอง่ายแต่พลาดง่าย
  scales: [1.0]           # ลองหลายขนาดได้ เช่น [0.9, 1.0, 1.1] เผื่อความละเอียดจอต่างกัน
  grayscale: false        # true = match แบบขาวดำ (เร็วขึ้น/ทนสีเปลี่ยน แต่แม่นน้อยลง)

input:
  click_delay_min: 0.06   # หน่วงสุ่มก่อน/หลังคลิก (วินาที) ให้ดูเป็นมนุษย์
  click_delay_max: 0.18
  instant_move: true      # true = เมาส์พุ่งไปจุดเป้าหมายทันที (ไม่ลากไล่ทีละสเต็ป)
  move_duration: 0.25     # เวลาเลื่อนเมาส์ (วินาที) — ใช้เฉพาะตอน instant_move = false
  settle_before_click: 0.12  # หยุดนิ่งหลังเมาส์ถึงเป้าหมาย ก่อนกดคลิก (กันคลิกตอนยังไม่ถึง)
  action_delay: 0.5       # หน่วงหลัง "ทุกครั้งที่คลิก" เพื่อรอ UI เกมตอบสนอง ก่อนทำ step ถัดไป
  restore_cursor: false   # คืนตำแหน่งเมาส์เดิมหลังคลิก (false = ปล่อยไว้ที่ปุ่ม ดูเป็นธรรมชาติกว่า)

safety:
  failsafe_corner: true   # เลื่อนเมาส์ไปชนมุมซ้ายบนสุด = หยุดฉุกเฉินทันที
  stop_hotkey_f9: true    # กด F9 เพื่อสั่งหยุดทุก task

logging:
  level: INFO             # DEBUG / INFO / WARNING

runtime:
  # โหมดเบื้องหลัง: true = พับจอ/สลับไปทำอย่างอื่นได้ (จับภาพด้วย PrintWindow + คลิกด้วย PostMessage)
  # ⚠ best-effort: บาง engine เกมอาจไม่รับคลิกแบบนี้ ถ้าเกมไม่ตอบสนองให้ปิด (false = โหมด foreground)
  # หมายเหตุ: อย่า "ย่อ (minimize)" หน้าต่าง — ปล่อยให้เปิดอยู่ข้างหลังได้ (ไม่งั้นจับภาพเป็นจอดำ)
  background_mode: false

# --- พารามิเตอร์เฉพาะงานทำอาหาร (โหมดแตะทุกอย่างที่เห็น รองรับหลายเตา) ---
cooking:
  repeat: 0                 # 0 = ทำจนกว่าจะกดหยุด ; > 0 = หยุดเมื่อเก็บอาหารครบ N จาน (นับจาก cook_done)
  scan_delay: 0.1           # หน่วง (วินาที) ระหว่างการสแกนหน้าจอแต่ละรอบ (น้อย = เร็ว, แนะนำ 0.05-0.2)
  dedup_distance: 40        # px: คลิกที่ห่างกันน้อยกว่านี้ถือเป็นจุดเดียว (กันคลิกซ้ำ + แยกเตา)
  click_cooldown: 0.5       # วินาที: ไม่คลิกจุดเดิมซ้ำภายในเวลานี้ (0 = ปิด, คลิกรัวทุกสแกน)
  multi_click_delay: 0.02   # วินาที: หน่วงระหว่างคลิกแต่ละจุดในรอบสแกนเดียว (น้อย = คลิกหลายเตาไวขึ้น)
  # match_threshold: 0.78   # (ทางเลือก) เกณฑ์เฉพาะงานทำอาหาร ถ้าไม่ตั้งจะใช้ vision.match_threshold
  # (ทางเลือกสำรอง) กดปุ่มคีย์บอร์ดเมื่อ "ไม่เจอปุ่มบนจอ" เพื่อเปิดเมนูเตา
  #   ปกติแนะนำให้ใช้ template 'stove' คลิกเปิดเมนูแทน (แม่นกว่า) -> ค่าเริ่มต้นจึงปิดไว้ ("")
  #   ถ้าเกมเปิดเตาด้วยปุ่มคีย์ ให้ใส่ เช่น "enter" หรือ "f"
  interact_key: ""
  interact_idle_scans: 5    # กด interact_key ทุกๆ กี่รอบสแกนที่ไม่เจอปุ่มอะไรเลย
  # บอทจะคลิก template เหล่านี้ "ทุกจุดที่เจอ" บนหน้าจอ (รองรับหลายเตาพร้อมกัน)
  #   stove      = ตัวเตา (ตอนเดิน) -> คลิกเพื่อ "เปิดเมนูทำอาหาร" *** สำคัญ! ขาดอันนี้บอทจะเปิดเมนูเองไม่ได้ ***
  #   cook_start = ปุ่มปรุง (ปุ่มฟ้า/เขียวในเมนู), heat_adjust = ปรับไฟ, cook_done = เก็บอาหาร
  #   cook_again = ปุ่มทำอาหารต่อ (ถ้าเกมมี — ถ้าไม่มีก็วนด้วยการคลิก stove ใหม่)
  # หลายเตา: ถ้าเตามองเห็นพร้อมกันบนจอและหน้าตา "เหมือนกัน" -> ใช้ stove ตัวเดียวจับได้หมดอัตโนมัติ
  #          ถ้าเตาแต่ละตัวมุม/ขนาดต่างกัน (ภาพ 3D) -> capture แยกเป็น stove2, stove3 แล้วใส่เพิ่มในลิสต์นี้
  click_templates: ["stove", "cook_start", "heat_adjust", "cook_done", "cook_again"]
